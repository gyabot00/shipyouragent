<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2836"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#f5f0e8" stroke-width="0.5">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>
  
  <!-- Orange accent bar top -->
  <rect x="0" y="0" width="400" height="4" fill="#e8612d"/>
  
  <!-- Giant ghost letter -->
  <text x="200" y="270" font-family="Georgia, serif" font-size="280" font-weight="900" fill="rgba(232,97,45,0.06)" text-anchor="middle">S</text>
  
  <!-- Main text block -->
  <text x="200" y="155" font-family="Georgia, serif" font-size="72" font-weight="900" fill="#f5f0e8" text-anchor="middle" letter-spacing="-2">SHIP</text>
  <text x="200" y="215" font-family="Georgia, serif" font-size="48" font-weight="400" font-style="italic" fill="#e8612d" text-anchor="middle">Your</text>
  <text x="200" y="275" font-family="Georgia, serif" font-size="72" font-weight="900" fill="#f5f0e8" text-anchor="middle" letter-spacing="-2">AGENT</text>
  
  <!-- Mono subtitle -->
  <text x="200" y="320" font-family="monospace" font-size="11" fill="rgba(245,240,232,0.35)" text-anchor="middle" letter-spacing="4">AI AGENTS ON A BUDGET</text>
  
  <!-- Bottom orange accent -->
  <rect x="0" y="396" width="400" height="4" fill="#e8612d"/>
  
  <!-- Corner marks -->
  <g stroke="#e8612d" stroke-width="1.5" opacity="0.4">
    <line x1="20" y1="20" x2="40" y2="20"/>
    <line x1="20" y1="20" x2="20" y2="40"/>
    <line x1="380" y1="20" x2="360" y2="20"/>
    <line x1="380" y1="20" x2="380" y2="40"/>
    <line x1="20" y1="380" x2="40" y2="380"/>
    <line x1="20" y1="380" x2="20" y2="360"/>
    <line x1="380" y1="380" x2="360" y2="380"/>
    <line x1="380" y1="380" x2="380" y2="360"/>
  </g>
</svg>
