<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2836"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  
  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#f5f0e8" stroke-width="0.5">
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="400" x2="1500" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
  </g>
  
  <!-- Orange accent bars -->
  <rect x="0" y="0" width="1500" height="4" fill="#e8612d"/>
  <rect x="0" y="496" width="1500" height="4" fill="#e8612d"/>
  
  <!-- Giant ghost text -->
  <text x="750" y="380" font-family="Georgia, serif" font-size="400" font-weight="900" fill="rgba(232,97,45,0.04)" text-anchor="middle">SYA</text>
  
  <!-- Main headline -->
  <text x="100" y="200" font-family="Georgia, serif" font-size="80" font-weight="900" fill="#f5f0e8" letter-spacing="-2">Ship Your</text>
  <text x="100" y="290" font-family="Georgia, serif" font-size="80" font-weight="400" font-style="italic" fill="#e8612d" letter-spacing="-1">Agent</text>
  
  <!-- Right side info blocks -->
  <g font-family="monospace" fill="rgba(245,240,232,0.4)" font-size="11" letter-spacing="2">
    <text x="1050" y="175">$8/MO SERVER</text>
    <text x="1050" y="200">13 SCAFFOLD FILES</text>
    <text x="1050" y="225">4 PHASES TO REVENUE</text>
    <text x="1050" y="250">UNDER $50/MO TOTAL</text>
  </g>

  <!-- Divider line -->
  <line x1="1020" y1="160" x2="1020" y2="260" stroke="#e8612d" stroke-width="1" opacity="0.4"/>
  
  <!-- Bottom tagline -->
  <text x="100" y="370" font-family="monospace" font-size="13" fill="rgba(245,240,232,0.3)" letter-spacing="3">BUILD · DEPLOY · MONETIZE YOUR OWN AI AGENT</text>
  
  <!-- Corner marks -->
  <g stroke="#e8612d" stroke-width="1.5" opacity="0.3">
    <line x1="30" y1="30" x2="60" y2="30"/>
    <line x1="30" y1="30" x2="30" y2="60"/>
    <line x1="1470" y1="30" x2="1440" y2="30"/>
    <line x1="1470" y1="30" x2="1470" y2="60"/>
    <line x1="30" y1="470" x2="60" y2="470"/>
    <line x1="30" y1="470" x2="30" y2="440"/>
    <line x1="1470" y1="470" x2="1440" y2="470"/>
    <line x1="1470" y1="470" x2="1470" y2="440"/>
  </g>
</svg>
